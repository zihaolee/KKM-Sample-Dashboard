<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKM Network Switch Deployment — Progress Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0; --card: #ffffff; --card2: #f0ede8; --border: #e0ddd7;
    --text: #1a1917; --muted: #6b6a65; --accent: #1a4f8a; --accent-light: #e6eef8;
    --green: #1d6b47; --green-bg: #e4f3ec; --amber: #7a4f0a; --amber-bg: #fdf0d8;
    --mono: 'IBM Plex Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }
  nav { background: var(--accent); color: #fff; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .nav-sub { font-size: 11px; font-family: var(--mono); opacity: 0.6; letter-spacing: 0.04em; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { background: transparent; border: none; color: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: var(--sans); cursor: pointer; transition: all 0.15s; }
  .nav-tab.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 500; }
  .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }
  .refresh-btn { background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; color: rgba(255,255,255,0.8); padding: 5px 12px; font-size: 11px; font-family: var(--mono); cursor: pointer; }
  .refresh-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .page { display: none; padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
  .page.active { display: block; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.05em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .stat-card.accent { background: var(--accent); border-color: var(--accent); }
  .stat-card.accent .stat-label { color: rgba(255,255,255,0.65); }
  .stat-card.accent .stat-value { color: #fff; }
  .stat-card.accent .stat-sub { color: rgba(255,255,255,0.6); }
  .prog-track { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }
  .prog-fill.green { background: var(--green); }
  .sec-title { font-size: 13px; font-weight: 500; font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--card2); padding: 10px 14px; text-align: left; font-size: 11px; font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card2); }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge.complete { background: var(--green-bg); color: var(--green); }
  .badge.complete::before { background: var(--green); }
  .badge.inprogress { background: var(--amber-bg); color: var(--amber); }
  .badge.inprogress::before { background: #d4880f; }
  .badge.pending { background: var(--card2); color: var(--muted); }
  .badge.pending::before { background: #aaa; }
  .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; font-size: 13px; font-family: var(--sans); color: var(--text); outline: none; }
  .filter-bar input { flex: 1; min-width: 180px; }
  .filter-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .state-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .state-name { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .state-nums { display: flex; justify-content: space-between; font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 6px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .dash-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; }
  .dash-title { font-size: 22px; font-weight: 600; }
  .dash-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .last-updated { font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .loading-state { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .error-banner { background: #fde8e8; border: 1px solid #f5a0a0; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #8a1f1f; margin-bottom: 20px; }
  .config-note { background: var(--accent-light); border: 1px solid rgba(26,79,138,0.2); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--accent); margin-bottom: 20px; font-family: var(--mono); }
  .photo-strip { display: flex; flex-wrap: wrap; gap: 4px; }
  .photo-thumb { width: 34px; height: 34px; border-radius: 4px; object-fit: cover; cursor: pointer; border: 1px solid var(--border); }
  .photo-thumb:hover { opacity: 0.78; }
  .photo-more { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 4px; background: var(--card2); border: 1px solid var(--border); font-size: 10px; font-family: var(--mono); color: var(--muted); cursor: pointer; }
  .photo-more:hover { border-color: var(--accent); color: var(--accent); }
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: none; align-items: center; justify-content: center; flex-direction: column; }
  #lightbox.open { display: flex; }
  #lb-img { max-width: 90vw; max-height: 80vh; border-radius: 8px; object-fit: contain; }
  #lb-caption { color: rgba(255,255,255,0.5); font-size: 12px; font-family: var(--mono); margin-top: 10px; text-align: center; }
  #lb-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 28px; cursor: pointer; }
  #lb-close:hover { color: #fff; }
  #lb-nav { display: flex; gap: 12px; margin-top: 14px; }
  .lb-nav-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: #fff; padding: 7px 20px; font-size: 13px; cursor: pointer; font-family: var(--sans); }
  .lb-nav-btn:hover { background: rgba(255,255,255,0.22); }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr; } nav { padding: 0 16px; } .page { padding: 16px; } }

  /* UAT modal */
  #uat-modal { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:300; display:none; align-items:center; justify-content:center; flex-direction:column; }
  #uat-modal.open { display:flex; }
  .uat-modal-box { background:#fff; border-radius:10px; overflow:hidden; width:90vw; max-width:860px; height:85vh; display:flex; flex-direction:column; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
  .uat-modal-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:var(--accent); color:#fff; flex-shrink:0; }
  .uat-modal-title { font-size:13px; font-weight:600; font-family:var(--mono); }
  .uat-modal-close { background:none; border:none; color:rgba(255,255,255,0.8); font-size:22px; cursor:pointer; line-height:1; }
  .uat-modal-close:hover { color:#fff; }
  .uat-modal-tabs { display:flex; gap:4px; padding:8px 12px; background:var(--card2); border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .uat-tab { padding:4px 12px; border-radius:5px; font-size:11px; font-family:var(--mono); cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--muted); white-space:nowrap; }
  .uat-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .uat-modal-frame { flex:1; border:none; width:100%; }
  .uat-modal-dl { padding:8px 18px; background:var(--card2); border-top:1px solid var(--border); font-size:11px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .uat-dl-btn { padding:4px 12px; background:var(--accent); color:#fff; border:none; border-radius:5px; font-size:11px; font-family:var(--mono); cursor:pointer; text-decoration:none; }
  /* UAT badge in table */
  .uat-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:5px; font-size:11px; font-family:var(--mono); background:var(--accent-light); color:var(--accent); border:1px solid rgba(26,79,138,0.2); cursor:pointer; white-space:nowrap; }
  .uat-badge:hover { background:var(--accent); color:#fff; }
  .uat-none { font-size:11px; color:var(--muted); }

  /* Date display */
  .date-cell { font-size:11px; font-family:var(--mono); white-space:nowrap; }
  .date-val { color:var(--text); }
  .date-none { color:var(--muted); }
  .date-overdue { color:#b91c1c; }
  .date-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:1px; }
</style>
</head>
<body>
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">x</button>
  <img id="lb-img" src="" alt="">
  <div id="lb-caption"></div>
  <div id="lb-nav">
    <button class="lb-nav-btn" onclick="lbNav(-1)">Prev</button>
    <button class="lb-nav-btn" onclick="window.open(document.getElementById('lb-img').dataset.fullurl,'_blank')" style="background:rgba(26,79,138,0.4);border-color:rgba(26,79,138,0.5)">Full size</button>
    <button class="lb-nav-btn" onclick="lbNav(1)">Next</button>
  </div>
</div>
<nav>
  <div>
    <div class="nav-brand">KKM Switch Deployment</div>
    <div class="nav-sub">Kementerian Kesihatan Malaysia - Phase 2</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('dashboard',event)">Dashboard</button>
      <button class="nav-tab" onclick="showPage('locations',event)">All Locations</button>
    </div>
  </div>
</nav>
<div id="page-dashboard" class="page active">
  <div id="dash-content"><div class="loading-state">Loading deployment data...</div></div>
</div>
<div id="page-locations" class="page">
  <div class="dash-header">
    <div><div class="dash-title">All Deployment Locations</div><div class="dash-sub">33 facilities - 320 switches total</div></div>
  </div>
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <input type="text" id="search-input" placeholder="Search facility..." oninput="renderLocations()">
    <select id="filter-state" onchange="renderLocations()"><option value="">All States</option></select>
    <select id="filter-status" onchange="renderLocations()">
      <option value="">All Statuses</option><option value="complete">Complete</option>
      <option value="inprogress">In Progress</option><option value="pending">Pending</option>
    </select>
    <select id="filter-photos" onchange="renderLocations()">
      <option value="">All Sites</option><option value="yes">Has Photos</option><option value="no">No Photos</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:36px">#</th><th>Facility</th><th>State</th>
        <th style="text-align:center">Qty</th><th style="text-align:center">Installed</th>
        <th style="min-width:140px">Progress</th><th style="width:110px">Status</th>
        <th>Notes</th><th style="min-width:130px">Dates</th><th style="min-width:140px">Photos</th><th style="min-width:120px">UAT</th>
      </tr></thead>
      <tbody id="loc-table-body"><tr><td colspan="11" class="loading-state">Loading...</td></tr></tbody>
    </table>
  </div>
  <div style="font-size:11px;font-family:var(--mono);color:var(--muted);text-align:right;margin-top:-16px;margin-bottom:24px" id="loc-sync-ts"></div>
</div>
<script>
// ================================================================
//  CONFIGURE: paste your Apps Script Web App URL here
// ================================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyGA_WlbOapOR28CaFCvopzAZ3uZa65MuQRTiOAwAsFw4mygHNXBuD_0juu8YAFQFAvCQ/exec';
// ================================================================
const LOCATIONS = [
  {id:1,state:"WP Putrajaya",facility:"Bahagian Pengurusan Maklumat, Kompleks E",qty:17},
  {id:2,state:"Selangor",facility:"Makmal Kesihatan Awam Kebangsaan Sungai Buloh",qty:11},
  {id:3,state:"Selangor",facility:"Hospital Banting",qty:13},
  {id:4,state:"Selangor",facility:"Hospital Tengku Ampuan Rahimah",qty:20},
  {id:5,state:"Selangor",facility:"Hospital Orang Asli Gombak",qty:5},
  {id:6,state:"Johor",facility:"Hospital Sultanah Aminah",qty:13},
  {id:7,state:"Johor",facility:"Hospital Pakar Sultanah Fatimah",qty:9},
  {id:8,state:"Johor",facility:"Hospital Sultanah Nora Ismail",qty:14},
  {id:9,state:"Johor",facility:"Hospital Tangkak",qty:8},
  {id:10,state:"Johor",facility:"Hospital Kota Tinggi",qty:8},
  {id:11,state:"Johor",facility:"Hospital Permai",qty:10},
  {id:12,state:"Johor",facility:"Hospital Temenggong Seri Maharaja Tun Ibrahim",qty:10},
  {id:13,state:"Kedah",facility:"Hospital Kulim",qty:13},
  {id:14,state:"Kedah",facility:"Hospital Baling",qty:5},
  {id:15,state:"Kedah",facility:"Hospital Sultanah Maliha, Langkawi",qty:6},
  {id:16,state:"Kedah",facility:"Pejabat Kesihatan Daerah Kota Setar",qty:3},
  {id:17,state:"Kedah",facility:"Kolej Kejururawatan Alor Setar",qty:3},
  {id:18,state:"Kelantan",facility:"Hospital Tanah Merah",qty:2},
  {id:19,state:"Kelantan",facility:"Hospital Pasir Mas",qty:5},
  {id:20,state:"Melaka",facility:"Jabatan Kesihatan Negeri Melaka",qty:16},
  {id:21,state:"Melaka",facility:"Hospital Melaka",qty:19},
  {id:22,state:"Melaka",facility:"Hospital Alor Gajah",qty:5},
  {id:23,state:"Melaka",facility:"Hospital Jasin",qty:17},
  {id:24,state:"Pahang",facility:"Hospital Tengku Ampuan Afzan",qty:15},
  {id:25,state:"Pahang",facility:"Hospital Bentong",qty:10},
  {id:26,state:"Pahang",facility:"Hospital Jengka",qty:10},
  {id:27,state:"Pahang",facility:"Hospital Jerantut",qty:10},
  {id:28,state:"Perak",facility:"Hospital Raja Perempuan Bainun",qty:4},
  {id:29,state:"Perak",facility:"Makmal Kesihatan Awam Kebangsaan Ipoh",qty:5},
  {id:30,state:"Perak",facility:"Kolej Sains Kesihatan Bersekutu Sultan Azlan Shah",qty:11},
  {id:31,state:"Perlis",facility:"Pejabat Kesihatan Daerah Perlis",qty:2},
  {id:32,state:"Pulau Pinang",facility:"Hospital Pulau Pinang",qty:13},
  {id:33,state:"Pulau Pinang",facility:"Hospital Seberang Jaya",qty:8},
];
const TOTAL=LOCATIONS.reduce((s,l)=>s+l.qty,0);
let DATA={};

function uatBadge(id) {
  const docs = getUatDocs(id);
  if (!docs.length) return '<span class="uat-none">—</span>';
  return '<span class="uat-badge" onclick="openUatModal(' + id + ')" title="View UAT documents">📄 ' + docs.length + ' doc' + (docs.length > 1 ? 's' : '') + '</span>';
}

let uatCurrentId = null;
function openUatModal(id) {
  const docs = getUatDocs(id);
  if (!docs.length) return;
  const loc = LOCATIONS.find(l => l.id === id);
  uatCurrentId = id;
  document.getElementById('uat-modal-title').textContent = (loc ? loc.facility : '') + ' — UAT Documents';
  // Build tabs
  const tabsEl = document.getElementById('uat-modal-tabs');
  tabsEl.innerHTML = docs.map((d, i) => '<button class="uat-tab' + (i===0?' active':'') + '" onclick="switchUatTab(' + id + ',' + i + ',this)">' + d.name + '</button>').join('');
  // Load first doc
  switchUatTab(id, 0, tabsEl.firstChild);
  document.getElementById('uat-modal').classList.add('open');
}
function switchUatTab(id, idx, el) {
  const docs = getUatDocs(id);
  if (!docs[idx]) return;
  document.querySelectorAll('.uat-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('uat-frame').src = docs[idx].view_url;
  document.getElementById('uat-dl-link').href = docs[idx].dl_url;
  document.getElementById('uat-dl-name').textContent = docs[idx].name;
}
function closeUatModal() {
  document.getElementById('uat-modal').classList.remove('open');
  document.getElementById('uat-frame').src = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeUatModal();
});

async function loadData(){
  if(SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    document.getElementById('dash-content').innerHTML='<div class="config-note">Configure SCRIPT_URL in index.html and admin.html with your Apps Script Web App URL.</div>';
    renderLocations();populateStateFilters();return;
  }
  try{
    const res=await fetch(SCRIPT_URL+'?t='+Date.now());
    const json=await res.json();
    if(!json.ok)throw new Error(json.error);
    DATA=json;
    const ts=new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
    const el=document.getElementById('loc-sync-ts');
    if(el)el.textContent='Data synced at '+ts;
  }catch(e){
    document.getElementById('dash-content').innerHTML='<div class="error-banner">Could not load data: '+e.message+'</div>';
    DATA={locations:{}};
  }
  try{renderDashboard();}catch(e){document.getElementById('dash-content').innerHTML='<div class="error-banner">Render error: '+e.message+'</div>';console.error(e);}
  try{renderLocations();}catch(e){console.error(e);}
  populateStateFilters();
}
function getInst(id){return DATA.locations?.[String(id)]?.installed||0;}
function getNotes(id){return DATA.locations?.[String(id)]?.notes||'';}
function getPhotos(id){return DATA.locations?.[String(id)]?.photos||[];}
function getUatDocs(id){return DATA.locations?.[String(id)]?.uat_docs||[];}
function getPlannedStart(id){return DATA.locations?.[String(id)]?.planned_start||'';}
function getPlannedEnd(id){return DATA.locations?.[String(id)]?.planned_end||'';}
function getActualStart(id){return DATA.locations?.[String(id)]?.actual_start||'';}
function getActualEnd(id){return DATA.locations?.[String(id)]?.actual_end||'';}
function fmtDate(d){if(!d)return'';try{return new Date(d).toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return d;}}
function fmtRange(start,end){
  if(!start)return'—';
  const s=fmtDate(start);
  if(!end||end===start)return s;
  const ds=new Date(start),de=new Date(end);
  if(ds.getMonth()===de.getMonth()&&ds.getFullYear()===de.getFullYear()){
    return ds.getDate()+' – '+de.getDate()+' '+ds.toLocaleDateString('en-MY',{month:'short',year:'numeric'});
  }
  return s+' – '+fmtDate(end);
}
function dateCellHtml(id){
  const ps=getPlannedStart(id),pe=getPlannedEnd(id),as=getActualStart(id),ae=getActualEnd(id);
  const now=new Date();now.setHours(0,0,0,0);
  let html='<div class="date-cell">';
  if(ps){const overdue=!as&&new Date(ps)<now;html+='<span class="date-label">Planned</span><span class="date-val'+(overdue?' date-overdue':'')+'" title="'+fmtDate(ps)+(pe&&pe!==ps?' to '+fmtDate(pe):'')+'">'+fmtRange(ps,pe)+'</span>';}
  else{html+='<span class="date-label">Planned</span><span class="date-none">—</span>';}
  html+='<br>';
  if(as){html+='<span class="date-label">Actual</span><span class="date-val" style="color:var(--green)" title="'+fmtDate(as)+(ae&&ae!==as?' to '+fmtDate(ae):'')+'">'+fmtRange(as,ae)+'</span>';}
  else{html+='<span class="date-label">Actual</span><span class="date-none">—</span>';}
  return html+'</div>';
}
function getStatus(qty,inst){if(!inst)return'pending';if(inst>=qty)return'complete';return'inprogress';}
function badge(s){const L={complete:'Complete',inprogress:'In Progress',pending:'Pending'};return'<span class="badge '+s+'">'+L[s]+'</span>';}
function photoStrip(id){
  const photos=getPhotos(id);if(!photos.length)return'<span style="font-size:11px;color:var(--muted)">-</span>';
  const MAX=4;let html='<div class="photo-strip">';
  photos.slice(0,MAX).forEach((p,i)=>{
    const src=p.id?'https://lh3.googleusercontent.com/d/'+p.id+'=w400':(p.thumb||p.url||'');
    html+='<img class="photo-thumb" src="'+src+'" title="'+p.name+'" onclick="openLightbox('+id+','+i+')">';
  });
  if(photos.length>MAX)html+='<div class="photo-more" onclick="openLightbox('+id+','+MAX+')">+'+(photos.length-MAX)+'</div>';
  return html+'</div>';
}

let lbId=null,lbIdx=0;
function openLightbox(id,idx){
  lbId=id;lbIdx=idx;const photos=getPhotos(id);if(!photos[idx])return;
  const loc=LOCATIONS.find(l=>l.id===id);
  document.getElementById('lb-img').src=photos[idx].thumb||photos[idx].url||'';
  document.getElementById('lb-img').dataset.fullurl=photos[idx].url||'';
  document.getElementById('lb-caption').textContent=(loc?loc.facility:'')+' - '+photos[idx].name+' - '+(idx+1)+' of '+photos.length;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lb-img').src='';}
function lbNav(dir){
  const photos=getPhotos(lbId);lbIdx=(lbIdx+dir+photos.length)%photos.length;
  const loc=LOCATIONS.find(l=>l.id===lbId);
  document.getElementById('lb-img').src=photos[lbIdx].thumb||photos[lbIdx].url||'';
  document.getElementById('lb-img').dataset.fullurl=photos[lbIdx].url||'';
  document.getElementById('lb-caption').textContent=(loc?loc.facility:'')+' - '+photos[lbIdx].name+' - '+(lbIdx+1)+' of '+photos.length;
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);
});
function renderDashboard(){
  let totalInst=0,complete=0,inprog=0,withPhotos=0;
  LOCATIONS.forEach(l=>{const i=getInst(l.id);totalInst+=i;const s=getStatus(l.qty,i);if(s==='complete')complete++;else if(s==='inprogress')inprog++;if(getPhotos(l.id).length)withPhotos++;});
  const pct=Math.round((totalInst/TOTAL)*100);
  const ts=DATA.updated?new Date(DATA.updated).toLocaleString('en-MY',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'Not yet updated';
  const by=DATA.updated_by?' by '+DATA.updated_by:'';
  const states={};LOCATIONS.forEach(l=>{if(!states[l.state])states[l.state]={qty:0,inst:0,sites:0};states[l.state].qty+=l.qty;states[l.state].inst+=getInst(l.id);states[l.state].sites++;});
  document.getElementById('dash-content').innerHTML=`
    <div class="dash-header"><div><div class="dash-title">Deployment Progress Overview</div><div class="dash-sub">320 network switches across 33 Ministry of Health facilities</div></div><div style="text-align:right"><div class="last-updated">Last updated: ${ts}${by}</div></div></div>
    <div class="summary-grid">
      <div class="stat-card accent"><div class="stat-label">Overall Progress</div><div class="stat-value">${pct}%</div><div class="stat-sub">${totalInst} of ${TOTAL} switches installed</div></div>
      <div class="stat-card"><div class="stat-label">Sites Complete</div><div class="stat-value">${complete}</div><div class="stat-sub">of 33 locations</div></div>
      <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value">${inprog}</div><div class="stat-sub">locations active</div></div>
      <div class="stat-card"><div class="stat-label">Sites Documented</div><div class="stat-value">${withPhotos}</div><div class="stat-sub">with photos</div></div>
    </div>
    <div class="table-wrap" style="padding:18px 20px;margin-bottom:24px;"><div class="sec-title" style="margin-bottom:12px;">Overall installation progress</div><div class="prog-track" style="height:14px;border-radius:7px;"><div class="prog-fill green" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted);"><span>0</span><span>${totalInst} / ${TOTAL} switches</span><span>${TOTAL}</span></div></div>
    <div class="two-col">
      <div><div class="sec-head"><div class="sec-title">Progress by state</div></div><div class="state-grid">${Object.entries(states).sort((a,b)=>a[0].localeCompare(b[0])).map(([name,d])=>{const p=Math.round((d.inst/d.qty)*100);return'<div class="state-card"><div class="state-name">'+name+'</div><div class="state-nums"><span>'+d.sites+' sites</span><span>'+d.inst+'/'+d.qty+'</span></div><div class="prog-track"><div class="prog-fill '+(p===100?'green':'')+'" style="width:'+p+'%"></div></div><div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px;text-align:right">'+p+'%</div></div>';}).join('')}</div></div>
      <div><div class="sec-head"><div class="sec-title">Location summary</div></div><div class="table-wrap"><table><thead><tr><th>Facility</th><th style="text-align:center">Qty</th><th style="text-align:center">Installed</th><th>Status</th><th>Dates</th><th>Photos</th><th>UAT</th></tr></thead><tbody>${LOCATIONS.map(l=>'<tr><td style="font-weight:500">'+l.facility+'</td><td style="font-family:var(--mono);text-align:center">'+l.qty+'</td><td style="font-family:var(--mono);text-align:center">'+getInst(l.id)+'</td><td>'+badge(getStatus(l.qty,getInst(l.id)))+'</td><td>'+dateCellHtml(l.id)+'</td><td>'+photoStrip(l.id)+'</td><td>'+uatBadge(l.id)+'</td></tr>').join('')}</tbody></table></div></div>
    </div>`;
}
function renderLocations(){
  const search=(document.getElementById('search-input')?.value||'').toLowerCase();
  const state=document.getElementById('filter-state')?.value||'';
  const statusF=document.getElementById('filter-status')?.value||'';
  const photosF=document.getElementById('filter-photos')?.value||'';
  const rows=LOCATIONS.filter(l=>{
    if(state&&l.state!==state)return false;
    if(search&&!l.facility.toLowerCase().includes(search))return false;
    if(statusF&&getStatus(l.qty,getInst(l.id))!==statusF)return false;
    if(photosF==='yes'&&!getPhotos(l.id).length)return false;
    if(photosF==='no'&&getPhotos(l.id).length)return false;
    return true;
  });
  document.getElementById('loc-table-body').innerHTML=rows.map(l=>{const inst=getInst(l.id),s=getStatus(l.qty,inst),p=Math.round((inst/l.qty)*100);return'<tr><td style="font-family:var(--mono);font-size:11px;color:var(--muted)">'+l.id+'</td><td style="font-weight:500">'+l.facility+'</td><td style="font-size:11px;color:var(--muted)">'+l.state+'</td><td style="font-family:var(--mono);text-align:center">'+l.qty+'</td><td style="font-family:var(--mono);text-align:center">'+inst+'</td><td><div class="prog-track"><div class="prog-fill '+(s==='complete'?'green':'')+'" style="width:'+p+'%"></div></div><div style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:2px">'+p+'%</div></td><td>'+badge(s)+'</td><td style="font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(getNotes(l.id)||'-')+'</td><td>'+dateCellHtml(l.id)+'</td><td>'+photoStrip(l.id)+'</td><td>'+uatBadge(l.id)+'</td></tr>';}).join('');
}
function populateStateFilters(){
  const states=[...new Set(LOCATIONS.map(l=>l.state))].sort();
  const sel=document.getElementById('filter-state');if(!sel||sel.options.length>1)return;
  states.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});
}
function showPage(name,event){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(event)event.target.classList.add('active');
}
loadData();
</script>
