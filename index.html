<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKM Network Switch Deployment — Progress Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0; --card: #ffffff; --card2: #f0ede8; --border: #e0ddd7;
    --text: #1a1917; --muted: #6b6a65; --accent: #1a4f8a; --accent-light: #e6eef8;
    --green: #1d6b47; --green-bg: #e4f3ec; --amber: #7a4f0a; --amber-bg: #fdf0d8;
    --mono: 'IBM Plex Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { background: var(--accent); color: #fff; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .nav-brand { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .nav-sub { font-size: 11px; font-family: var(--mono); opacity: 0.6; letter-spacing: 0.04em; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { background: transparent; border: none; color: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 6px; font-size: 13px; font-family: var(--sans); cursor: pointer; transition: all 0.15s; }
  .nav-tab.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 500; }
  .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.1); color: #fff; }

  .page { display: none; padding: 28px 32px; max-width: 1280px; margin: 0 auto; }
  .page.active { display: block; }

  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-label { font-size: 11px; font-family: var(--mono); letter-spacing: 0.05em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .stat-card.accent { background: var(--accent); border-color: var(--accent); }
  .stat-card.accent .stat-label { color: rgba(255,255,255,0.65); }
  .stat-card.accent .stat-value { color: #fff; }
  .stat-card.accent .stat-sub { color: rgba(255,255,255,0.6); }

  .prog-track { height: 6px; background: var(--card2); border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s; }
  .prog-fill.green { background: var(--green); }

  .sec-title { font-size: 13px; font-weight: 500; font-family: var(--mono); letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--card2); padding: 10px 14px; text-align: left; font-size: 11px; font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card2); }
  tbody td { padding: 10px 14px; vertical-align: middle; }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge.complete { background: var(--green-bg); color: var(--green); }
  .badge.complete::before { background: var(--green); }
  .badge.inprogress { background: var(--amber-bg); color: var(--amber); }
  .badge.inprogress::before { background: #d4880f; }
  .badge.pending { background: var(--card2); color: var(--muted); }
  .badge.pending::before { background: #aaa; }

  .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-bar select, .filter-bar input { background: var(--card); border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; font-size: 13px; font-family: var(--sans); color: var(--text); outline: none; }
  .filter-bar select:focus, .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar input { flex: 1; min-width: 180px; }
  .filter-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .state-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .state-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .state-name { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .state-nums { display: flex; justify-content: space-between; font-size: 11px; font-family: var(--mono); color: var(--muted); margin-bottom: 6px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .dash-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 22px; }
  .dash-title { font-size: 22px; font-weight: 600; }
  .dash-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .last-updated { font-size: 11px; font-family: var(--mono); color: var(--muted); }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
  .error-banner { background: #fde8e8; border: 1px solid #f5a0a0; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #8a1f1f; margin-bottom: 20px; }

  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr; } nav { padding: 0 16px; } .page { padding: 16px; } }
</style>
</head>
<body>

<nav>
  <div>
    <div class="nav-brand">KKM Switch Deployment</div>
    <div class="nav-sub">Kementerian Kesihatan Malaysia — Phase 2</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showPage('locations')">All Locations</button>
  </div>
</nav>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div id="dash-content">
    <div class="loading">Loading latest deployment data...</div>
  </div>
</div>

<!-- ALL LOCATIONS -->
<div id="page-locations" class="page">
  <div class="dash-header">
    <div>
      <div class="dash-title">All Deployment Locations</div>
      <div class="dash-sub">33 facilities · 320 switches total</div>
    </div>
  </div>
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <input type="text" id="search-input" placeholder="Search facility name..." oninput="renderLocations()">
    <select id="filter-state" onchange="renderLocations()"><option value="">All States</option></select>
    <select id="filter-status" onchange="renderLocations()">
      <option value="">All Statuses</option>
      <option value="complete">Complete</option>
      <option value="inprogress">In Progress</option>
      <option value="pending">Pending</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px">#</th>
          <th>Facility</th>
          <th>State</th>
          <th style="text-align:center">Qty</th>
          <th style="text-align:center">Installed</th>
          <th style="min-width:140px">Progress</th>
          <th style="width:110px">Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="loc-table-body"><tr><td colspan="8" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const LOCATIONS = [
  {id:1,  state:"WP Putrajaya",  facility:"Bahagian Pengurusan Maklumat, Kompleks E", qty:17},
  {id:2,  state:"Selangor",      facility:"Makmal Kesihatan Awam Kebangsaan Sungai Buloh", qty:11},
  {id:3,  state:"Selangor",      facility:"Hospital Banting", qty:13},
  {id:4,  state:"Selangor",      facility:"Hospital Tengku Ampuan Rahimah", qty:20},
  {id:5,  state:"Selangor",      facility:"Hospital Orang Asli Gombak", qty:5},
  {id:6,  state:"Johor",         facility:"Hospital Sultanah Aminah", qty:13},
  {id:7,  state:"Johor",         facility:"Hospital Pakar Sultanah Fatimah", qty:9},
  {id:8,  state:"Johor",         facility:"Hospital Sultanah Nora Ismail", qty:14},
  {id:9,  state:"Johor",         facility:"Hospital Tangkak", qty:8},
  {id:10, state:"Johor",         facility:"Hospital Kota Tinggi", qty:8},
  {id:11, state:"Johor",         facility:"Hospital Permai", qty:10},
  {id:12, state:"Johor",         facility:"Hospital Temenggong Seri Maharaja Tun Ibrahim", qty:10},
  {id:13, state:"Kedah",         facility:"Hospital Kulim", qty:13},
  {id:14, state:"Kedah",         facility:"Hospital Baling", qty:5},
  {id:15, state:"Kedah",         facility:"Hospital Sultanah Maliha, Langkawi", qty:6},
  {id:16, state:"Kedah",         facility:"Pejabat Kesihatan Daerah Kota Setar", qty:3},
  {id:17, state:"Kedah",         facility:"Kolej Kejururawatan Alor Setar", qty:3},
  {id:18, state:"Kelantan",      facility:"Hospital Tanah Merah", qty:2},
  {id:19, state:"Kelantan",      facility:"Hospital Pasir Mas", qty:5},
  {id:20, state:"Melaka",        facility:"Jabatan Kesihatan Negeri Melaka", qty:16},
  {id:21, state:"Melaka",        facility:"Hospital Melaka", qty:19},
  {id:22, state:"Melaka",        facility:"Hospital Alor Gajah", qty:5},
  {id:23, state:"Melaka",        facility:"Hospital Jasin", qty:17},
  {id:24, state:"Pahang",        facility:"Hospital Tengku Ampuan Afzan", qty:15},
  {id:25, state:"Pahang",        facility:"Hospital Bentong", qty:10},
  {id:26, state:"Pahang",        facility:"Hospital Jengka", qty:10},
  {id:27, state:"Pahang",        facility:"Hospital Jerantut", qty:10},
  {id:28, state:"Perak",         facility:"Hospital Raja Perempuan Bainun", qty:4},
  {id:29, state:"Perak",         facility:"Makmal Kesihatan Awam Kebangsaan Ipoh", qty:5},
  {id:30, state:"Perak",         facility:"Kolej Sains Kesihatan Bersekutu Sultan Azlan Shah", qty:11},
  {id:31, state:"Perlis",        facility:"Pejabat Kesihatan Daerah Perlis", qty:2},
  {id:32, state:"Pulau Pinang",  facility:"Hospital Pulau Pinang", qty:13},
  {id:33, state:"Pulau Pinang",  facility:"Hospital Seberang Jaya", qty:8},
];
const TOTAL = LOCATIONS.reduce((s,l)=>s+l.qty,0);
let DATA = {};

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
  } catch(e) {
    document.getElementById('dash-content').innerHTML = `<div class="error-banner">Could not load deployment data. Make sure data.json is in the same folder as this file.</div>`;
    DATA = { locations: {}, updated: '', updated_by: '' };
  }
  renderDashboard();
  renderLocations();
  populateStateFilters();
}

function getInst(id) { return DATA.locations?.[id]?.installed || 0; }
function getNotes(id) { return DATA.locations?.[id]?.notes || ''; }
function getStatus(qty, inst) { if (inst===0) return 'pending'; if (inst>=qty) return 'complete'; return 'inprogress'; }
function badge(s) { const L={complete:'Complete',inprogress:'In Progress',pending:'Pending'}; return `<span class="badge ${s}">${L[s]}</span>`; }

function renderDashboard() {
  let totalInst=0, complete=0, inprog=0;
  LOCATIONS.forEach(l=>{ const i=getInst(l.id); totalInst+=i; const s=getStatus(l.qty,i); if(s==='complete')complete++; else if(s==='inprogress')inprog++; });
  const pct = Math.round((totalInst/TOTAL)*100);
  const ts = DATA.updated ? new Date(DATA.updated).toLocaleString('en-MY',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Not yet updated';
  const by = DATA.updated_by ? ` by ${DATA.updated_by}` : '';

  const states = {};
  LOCATIONS.forEach(l=>{
    if(!states[l.state]) states[l.state]={qty:0,inst:0,sites:0};
    states[l.state].qty+=l.qty; states[l.state].inst+=getInst(l.id); states[l.state].sites++;
  });

  document.getElementById('dash-content').innerHTML = `
    <div class="dash-header">
      <div>
        <div class="dash-title">Deployment Progress Overview</div>
        <div class="dash-sub">320 network switches across 33 Ministry of Health facilities</div>
      </div>
      <div style="text-align:right">
        <div class="last-updated">Last updated: ${ts}${by}</div>
      </div>
    </div>
    <div class="summary-grid">
      <div class="stat-card accent">
        <div class="stat-label">Overall Progress</div>
        <div class="stat-value">${pct}%</div>
        <div class="stat-sub">${totalInst} of ${TOTAL} switches installed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sites Complete</div>
        <div class="stat-value">${complete}</div>
        <div class="stat-sub">of 33 locations</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In Progress</div>
        <div class="stat-value">${inprog}</div>
        <div class="stat-sub">locations active</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Switches Installed</div>
        <div class="stat-value">${totalInst}</div>
        <div class="stat-sub">of ${TOTAL} total</div>
      </div>
    </div>
    <div class="table-wrap" style="padding:18px 20px;margin-bottom:24px;">
      <div class="sec-title" style="margin-bottom:12px;">Overall installation progress</div>
      <div class="prog-track" style="height:14px;border-radius:7px;">
        <div class="prog-fill green" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--muted);">
        <span>0</span><span>${totalInst} / ${TOTAL} switches</span><span>${TOTAL}</span>
      </div>
    </div>
    <div class="two-col">
      <div>
        <div class="sec-head"><div class="sec-title">Progress by state</div></div>
        <div class="state-grid">
          ${Object.entries(states).sort((a,b)=>a[0].localeCompare(b[0])).map(([name,d])=>{
            const p=Math.round((d.inst/d.qty)*100);
            return `<div class="state-card">
              <div class="state-name">${name}</div>
              <div class="state-nums"><span>${d.sites} sites</span><span>${d.inst}/${d.qty}</span></div>
              <div class="prog-track"><div class="prog-fill ${p===100?'green':''}" style="width:${p}%"></div></div>
              <div style="font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:4px;text-align:right">${p}%</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div>
        <div class="sec-head"><div class="sec-title">Location summary</div></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Facility</th><th style="text-align:center">Qty</th><th style="text-align:center">Installed</th><th>Status</th></tr></thead>
            <tbody>
              ${LOCATIONS.map(l=>`<tr>
                <td style="font-weight:500">${l.facility}</td>
                <td style="font-family:var(--mono);text-align:center">${l.qty}</td>
                <td style="font-family:var(--mono);text-align:center">${getInst(l.id)}</td>
                <td>${badge(getStatus(l.qty,getInst(l.id)))}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

function renderLocations() {
  const search = (document.getElementById('search-input')?.value||'').toLowerCase();
  const state  = document.getElementById('filter-state')?.value||'';
  const status = document.getElementById('filter-status')?.value||'';
  const rows = LOCATIONS.filter(l=>{
    if (state && l.state!==state) return false;
    if (search && !l.facility.toLowerCase().includes(search)) return false;
    if (status && getStatus(l.qty,getInst(l.id))!==status) return false;
    return true;
  });
  document.getElementById('loc-table-body').innerHTML = rows.map(l=>{
    const inst=getInst(l.id), s=getStatus(l.qty,inst), p=Math.round((inst/l.qty)*100);
    return `<tr>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${l.id}</td>
      <td style="font-weight:500">${l.facility}</td>
      <td style="font-size:11px;color:var(--muted)">${l.state}</td>
      <td style="font-family:var(--mono);text-align:center">${l.qty}</td>
      <td style="font-family:var(--mono);text-align:center">${inst}</td>
      <td>
        <div class="prog-track"><div class="prog-fill ${s==='complete'?'green':''}" style="width:${p}%"></div></div>
        <div style="font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:2px">${p}%</div>
      </td>
      <td>${badge(s)}</td>
      <td style="font-size:12px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${getNotes(l.id)||'—'}</td>
    </tr>`;
  }).join('');
}

function populateStateFilters() {
  const states = [...new Set(LOCATIONS.map(l=>l.state))].sort();
  ['filter-state'].forEach(id=>{
    const sel = document.getElementById(id); if (!sel) return;
    states.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });
  });
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.target.classList.add('active');
}

loadData();
</script>
</body>
</html>
